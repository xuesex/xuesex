name: Iron Triangle CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 1 * * *'  # 每天 UTC 1:00 = 北京时间 9:00

permissions:
  contents: read

jobs:
  # ============================================
  # 代码质量检查
  # ============================================
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Auto-detect and lint
        run: |
          echo "=== Project Structure ==="
          ls -la

          if [ -f package.json ]; then
            echo "→ Node.js project detected"
            node --version
            npm install --no-audit --no-fund
            if jq -e '.scripts.lint' package.json >/dev/null 2>&1; then
              npm run lint
            fi
          fi

          if [ -f requirements.txt ] || [ -f pyproject.toml ]; then
            echo "→ Python project detected"
            python3 --version
            pip install "ruff==0.11.8"
            ruff check .
          fi

          if [ -f go.mod ]; then
            echo "→ Go project detected"
            go version
            command -v golangci-lint >/dev/null && golangci-lint run || echo "::notice::golangci-lint not installed, skipping"
          fi

  # ============================================
  # 测试运行
  # ============================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v3

      - name: Auto-detect and test
        run: |
          if [ -f package.json ]; then
            echo "→ Node.js tests"
            npm install --no-audit --no-fund
            npm test 2>/dev/null || echo "::notice::No test script in package.json"
          fi

          if [ -f pyproject.toml ] || [ -f setup.cfg ]; then
            echo "→ Python tests"
            pip install -e '.[dev,test]' 2>/dev/null || pip install pytest
            python3 -m pytest -v --tb=short 2>/dev/null || echo "::notice::No pytest tests found"
          fi

          if [ -f Makefile ] && grep -q '^test:' Makefile; then
            echo "→ Make test"
            make test
          fi

  # ============================================
  # 依赖安全审计
  # ============================================
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v3

      - name: Audit dependencies
        run: |
          echo "=== Dependency Audit ==="

          # Node.js
          if [ -f package.json ]; then
            echo "→ npm audit"
            npm install --package-lock-only 2>/dev/null
            npm audit --audit-level=high || echo "::warning::npm audit found vulnerabilities"
            echo "→ npm outdated"
            npm outdated || true
          fi

          # Python
          if [ -f requirements.txt ]; then
            echo "→ Python requirements.txt"
            grep -v '^#' requirements.txt | grep -v '^$' | grep -v '^-' | head -20 || true
          fi

          if [ -f pyproject.toml ]; then
            echo "→ pyproject.toml dependencies"
            grep -A 50 '\[project\]' pyproject.toml 2>/dev/null | grep -E '^[a-zA-Z]' | head -20 || true
          fi

  # ============================================
  # 状态汇总
  # ============================================
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [lint, test, audit]
    steps:
      - name: Report
        run: |
          echo "┌─────────────────────────────────────┐"
          echo "│  Iron Triangle CI — Complete         │"
          echo "│  Lint:    ${{ needs.lint.result }}"
          echo "│  Test:    ${{ needs.test.result }}"
          echo "│  Audit:   ${{ needs.audit.result }}"
          echo "└─────────────────────────────────────┘"
