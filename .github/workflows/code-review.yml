name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    name: Claude Code Review (DeepSeek V4 Pro)
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin ${{ github.base_ref }}
          CHANGED=$(git diff origin/${{ github.base_ref }}...HEAD --name-only | \
            grep -v '\.github/workflows' | grep -v '\.lock$' | grep -v '\.json$' | grep -v '\.md$' || true)
          echo "files_changed=$CHANGED" >> $GITHUB_OUTPUT

          if [ -n "$CHANGED" ]; then
            echo "has_code=true" >> $GITHUB_OUTPUT
            git diff origin/${{ github.base_ref }}...HEAD -- . \
              ':!.github/workflows' ':!*.lock' ':!*.json' ':!*.md' | head -3000 > /tmp/pr-diff.txt
          else
            echo "has_code=false" >> $GITHUB_OUTPUT
          fi

      - name: AI Code Review (no code changes)
        if: steps.diff.outputs.has_code == 'false'
        run: |
          REVIEW='## 🤖 Iron Triangle AI Code Review\n\nNo source code changes detected (workflows/config/docs only).'
          echo "review_body=$REVIEW" >> $GITHUB_OUTPUT

      - name: AI Code Review (with code changes)
        id: ai_review
        if: steps.diff.outputs.has_code == 'true'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          # Use jq --arg to safely embed the diff without injection
          DIFF_TEXT=$(cat /tmp/pr-diff.txt)
          RESPONSE=$(jq -n \
            --arg diff "$DIFF_TEXT" \
            '{
              model: "deepseek-chat",
              max_tokens: 1500,
              system: "You are a senior code reviewer. Review the git diff. Be concise. Focus on: bugs, security vulnerabilities, logic errors, race conditions, resource leaks. Ignore style, formatting, naming. Format review as markdown. If code looks good, say \"LGTM ✅ No issues found.\"",
              messages: [
                {role: "user", content: "Review this PR diff:\n\n\($diff)"}
              ]
            }' | curl -s https://api.deepseek.com/anthropic/v1/messages \
              -H "Content-Type: application/json" \
              -H "x-api-key: $DEEPSEEK_API_KEY" \
              -d @-)

          REVIEW_BODY=$(echo "$RESPONSE" | jq -r '.content[0].text // "⚠️ Review API returned unexpected response"')

          # Save to file to avoid GitHub expression injection
          printf '%s' "$REVIEW_BODY" > /tmp/review-body.txt

      - name: Post review comment
        if: always()
        uses: actions/github-script@v7
        env:
          HAS_CODE: ${{ steps.diff.outputs.has_code }}
        with:
          script: |
            const fs = require('fs');
            let reviewBody;

            if (process.env.HAS_CODE === 'true' && fs.existsSync('/tmp/review-body.txt')) {
              reviewBody = fs.readFileSync('/tmp/review-body.txt', 'utf8');
            } else {
              reviewBody = 'No source code changes detected (workflows/config/docs only).';
            }

            const commentBody = `## 🤖 Iron Triangle AI Code Review\n\n${reviewBody}\n\n---\n*Reviewed by Claude Code (DeepSeek V4 Pro) | Iron Triangle CI*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });
